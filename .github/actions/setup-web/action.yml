name: Setup web workspace
description: Install pnpm, Node.js, and repository dependencies for the Svelte app.

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v5
      with:
        version: 10

    - uses: actions/setup-node@v6
      with:
        node-version: "22"
        cache: "pnpm"

    - name: Install dependencies
      shell: bash
      env:
        # E2E job installs Chromium explicitly with --with-deps; skip postinstall download.
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      run: pnpm install --frozen-lockfile
