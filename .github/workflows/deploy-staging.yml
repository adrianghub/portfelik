name: Deploy staging

on:
  push:
    branches: [dev]

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, lint, format, unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-web

      - name: Typecheck
        working-directory: apps/web-svelte
        run: |
          printf 'PUBLIC_SUPABASE_URL=https://placeholder.supabase.co\nPUBLIC_SUPABASE_ANON_KEY=placeholder\nPUBLIC_VAPID_KEY=placeholder\nPUBLIC_PLAUSIBLE_DOMAIN=\n' > .env
          pnpm exec svelte-kit sync
          pnpm exec svelte-check --tsconfig ./tsconfig.json

      - name: Lint
        working-directory: apps/web-svelte
        run: pnpm lint

      - name: Format check
        working-directory: apps/web-svelte
        run: pnpm format:check

      - name: Unit tests
        working-directory: apps/web-svelte
        run: pnpm test:unit

      - name: Component tests
        working-directory: apps/web-svelte
        run: pnpm test:components

      - name: Secret scan
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          curl -fsSL -o /tmp/gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks git --no-banner --redact --config .gitleaks.toml .

  rls:
    name: RLS regression
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-web

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Capture local Supabase env
        run: |
          eval "$(supabase status -o env | sed -E 's/^([A-Z_]+)="?([^"]+)"?$/export \1=\2/')"
          {
            echo "SUPABASE_URL=$API_URL"
            echo "SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"

      - name: Generate ephemeral RLS test password
        run: echo "RLS_TEST_PASSWORD=$(openssl rand -hex 24)" >> "$GITHUB_ENV"

      - name: Run RLS suite
        working-directory: apps/web-svelte
        run: pnpm test:rls

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup

  e2e:
    name: Playwright E2E mocked
    needs: [quality, rls]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-web

      - name: Install Playwright browsers
        working-directory: apps/web-svelte
        run: pnpm exec playwright install --with-deps chromium

      - name: Build app
        working-directory: apps/web-svelte
        env:
          PUBLIC_SUPABASE_URL: https://emqzcygfwcvbmhxhfkcc.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          PUBLIC_VAPID_KEY: BHKoiccZwq3Y5Qw5dmFxVLJIA7w9zcSZkchPKWk-vxBeR421yieZW7gGxuluBBa6sRmpIsFXRSuFyRarLcdvqT4
          PUBLIC_PLAUSIBLE_DOMAIN: ""
        run: pnpm build

      - name: Run Playwright tests
        working-directory: apps/web-svelte
        env:
          CI: true
        run: pnpm exec playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web-svelte/playwright-report/
          retention-days: 7

  migrate:
    name: Migrate and seed Supabase
    needs: [quality, rls, e2e]
    runs-on: ubuntu-latest
    environment:
      name: Staging
      url: https://dev.portfelik.pages.dev
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-web

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link staging project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.STAGING_SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}
          STAGING_SUPABASE_PROJECT_REF: ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}
        run: |
          test "$STAGING_SUPABASE_PROJECT_REF" != "emqzcygfwcvbmhxhfkcc"
          supabase link --project-ref "$STAGING_SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations and system seed to staging
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.STAGING_SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}
        run: supabase db push --linked --include-seed --yes

      - name: Deploy staging Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.STAGING_SUPABASE_ACCESS_TOKEN }}
          STAGING_SUPABASE_PROJECT_REF: ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}
        run: |
          supabase functions deploy send-push --project-ref "$STAGING_SUPABASE_PROJECT_REF"
          supabase functions deploy send-admin-summary --project-ref "$STAGING_SUPABASE_PROJECT_REF"
          supabase functions deploy sync-user-role --project-ref "$STAGING_SUPABASE_PROJECT_REF"

      - name: Seed staging personas and synthetic fixtures
        working-directory: apps/web-svelte
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_PUBLIC_SUPABASE_URL }}
          STAGING_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          STAGING_DEMO_EMAIL: ${{ secrets.STAGING_DEMO_EMAIL }}
          STAGING_DEMO_PASSWORD: ${{ secrets.STAGING_DEMO_PASSWORD }}
          STAGING_E2E_SMOKE_EMAIL: ${{ secrets.STAGING_E2E_SMOKE_EMAIL }}
          STAGING_E2E_SMOKE_PASSWORD: ${{ secrets.STAGING_E2E_SMOKE_PASSWORD }}
        run: pnpm seed:staging

  deploy:
    name: Cloudflare Pages
    needs: migrate
    runs-on: ubuntu-latest
    environment:
      name: Staging
      url: https://dev.portfelik.pages.dev
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-web

      - name: Build SvelteKit app
        working-directory: apps/web-svelte
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_VAPID_KEY: ${{ secrets.STAGING_PUBLIC_VAPID_KEY }}
          PUBLIC_PLAUSIBLE_DOMAIN: ${{ secrets.STAGING_PUBLIC_PLAUSIBLE_DOMAIN }}
        run: |
          test "$PUBLIC_SUPABASE_URL" != "https://emqzcygfwcvbmhxhfkcc.supabase.co"
          pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy apps/web-svelte/build --project-name=jakstoimy --branch=dev --commit-dirty=true

  smoke:
    name: Real-DB smoke
    needs: deploy
    runs-on: ubuntu-latest
    environment:
      name: Staging
      url: https://dev.portfelik.pages.dev
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-web

      - name: Install Playwright browsers
        working-directory: apps/web-svelte
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke suite
        working-directory: apps/web-svelte
        env:
          CI: true
          SMOKE_BASE_URL: https://dev.portfelik.pages.dev
          PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_PUBLIC_SUPABASE_ANON_KEY }}
          E2E_SMOKE_EMAIL: ${{ secrets.STAGING_E2E_SMOKE_EMAIL }}
          E2E_SMOKE_PASSWORD: ${{ secrets.STAGING_E2E_SMOKE_PASSWORD }}
        run: |
          test "$PUBLIC_SUPABASE_URL" != "https://emqzcygfwcvbmhxhfkcc.supabase.co"
          pnpm exec playwright test --config=playwright.smoke.config.ts

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-smoke-report
          path: apps/web-svelte/playwright-report/
          retention-days: 7
