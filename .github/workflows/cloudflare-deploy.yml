name: CI / Deploy

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: apps/web-svelte
        run: |
          printf 'PUBLIC_SUPABASE_URL=https://placeholder.supabase.co\nPUBLIC_SUPABASE_ANON_KEY=placeholder\nPUBLIC_VAPID_KEY=placeholder\n' > .env
          pnpm exec svelte-kit sync
          pnpm exec svelte-check --tsconfig ./tsconfig.json

      - name: Lint
        working-directory: apps/web-svelte
        run: pnpm lint

  rls:
    name: RLS regression (local Supabase)
    needs: ci
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Capture local Supabase env
        run: |
          eval "$(supabase status -o env | sed -E 's/^([A-Z_]+)="?([^"]+)"?$/export \1=\2/')"
          {
            echo "SUPABASE_URL=$API_URL"
            echo "SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate ephemeral RLS test password
        run: echo "RLS_TEST_PASSWORD=$(openssl rand -hex 24)" >> "$GITHUB_ENV"

      - name: Run RLS suite
        working-directory: apps/web-svelte
        run: pnpm test:rls

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup

  e2e:
    name: Playwright E2E (mocked)
    needs: [ci, rls]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web-svelte
        run: pnpm exec playwright install --with-deps chromium

      - name: Build app
        working-directory: apps/web-svelte
        env:
          PUBLIC_SUPABASE_URL: https://emqzcygfwcvbmhxhfkcc.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiJ9.fake
          PUBLIC_VAPID_KEY: BHKoiccZwq3Y5Qw5dmFxVLJIA7w9zcSZkchPKWk-vxBeR421yieZW7gGxuluBBa6sRmpIsFXRSuFyRarLcdvqT4
        run: pnpm build

      - name: Run Playwright tests
        working-directory: apps/web-svelte
        env:
          CI: true
        run: pnpm exec playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web-svelte/playwright-report/
          retention-days: 7

  deploy-prod:
    name: Deploy to Cloudflare Pages (production)
    needs: [ci, rls, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://portfelik.adrianzinko.com
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SvelteKit app
        working-directory: apps/web-svelte
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_VAPID_KEY: ${{ secrets.PUBLIC_VAPID_KEY }}
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web-svelte/build --project-name=portfelik --branch=main --commit-dirty=true

  deploy-staging:
    name: Deploy to Cloudflare Pages (staging)
    needs: [ci, rls, e2e]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: Staging
      url: https://dev.portfelik.pages.dev
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SvelteKit app
        working-directory: apps/web-svelte
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_VAPID_KEY: ${{ secrets.PUBLIC_VAPID_KEY }}
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web-svelte/build --project-name=portfelik --branch=dev --commit-dirty=true

  smoke:
    name: Real-DB smoke (staging)
    needs: deploy-staging
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: Staging
      url: https://dev.portfelik.pages.dev
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web-svelte
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke suite
        working-directory: apps/web-svelte
        env:
          CI: true
          SMOKE_BASE_URL: https://dev.portfelik.pages.dev
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          E2E_SMOKE_EMAIL: ${{ secrets.E2E_SMOKE_EMAIL }}
          E2E_SMOKE_PASSWORD: ${{ secrets.E2E_SMOKE_PASSWORD }}
        run: pnpm exec playwright test --config=playwright.smoke.config.ts

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-smoke-report
          path: apps/web-svelte/playwright-report/
          retention-days: 7
