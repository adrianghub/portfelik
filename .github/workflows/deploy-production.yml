name: Deploy production

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  quality:
    name: Typecheck, lint, format, unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-web

      - name: Typecheck
        working-directory: apps/web-svelte
        run: |
          printf 'PUBLIC_SUPABASE_URL=https://placeholder.supabase.co\nPUBLIC_SUPABASE_ANON_KEY=placeholder\nPUBLIC_VAPID_KEY=placeholder\nPUBLIC_PLAUSIBLE_DOMAIN=\n' > .env
          pnpm exec svelte-kit sync
          pnpm exec svelte-check --tsconfig ./tsconfig.json

      - name: Lint
        working-directory: apps/web-svelte
        run: pnpm lint

      - name: Format check
        working-directory: apps/web-svelte
        run: pnpm format:check

      - name: Unit tests
        working-directory: apps/web-svelte
        run: pnpm test:unit

      - name: Component tests
        working-directory: apps/web-svelte
        run: pnpm test:components

      - name: Secret scan
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          curl -fsSL -o /tmp/gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks git --no-banner --redact --config .gitleaks.toml .

  rls:
    name: RLS regression
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-web

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Capture local Supabase env
        run: |
          eval "$(supabase status -o env | sed -E 's/^([A-Z_]+)="?([^"]+)"?$/export \1=\2/')"
          {
            echo "SUPABASE_URL=$API_URL"
            echo "SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"

      - name: Generate ephemeral RLS test password
        run: echo "RLS_TEST_PASSWORD=$(openssl rand -hex 24)" >> "$GITHUB_ENV"

      - name: Run RLS suite
        working-directory: apps/web-svelte
        run: pnpm test:rls

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup

  e2e:
    name: Playwright E2E mocked
    needs: [quality, rls]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-web

      - name: Install Playwright browsers
        working-directory: apps/web-svelte
        run: pnpm exec playwright install --with-deps chromium

      - name: Build app
        working-directory: apps/web-svelte
        env:
          PUBLIC_SUPABASE_URL: https://emqzcygfwcvbmhxhfkcc.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          PUBLIC_VAPID_KEY: BHKoiccZwq3Y5Qw5dmFxVLJIA7w9zcSZkchPKWk-vxBeR421yieZW7gGxuluBBa6sRmpIsFXRSuFyRarLcdvqT4
          PUBLIC_PLAUSIBLE_DOMAIN: ""
        run: pnpm build

      - name: Run Playwright tests
        working-directory: apps/web-svelte
        env:
          CI: true
        run: pnpm exec playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web-svelte/playwright-report/
          retention-days: 7

  deploy:
    name: Cloudflare Pages production
    needs: [quality, rls, e2e]
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://app.jakstoimy.pl
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-web

      - name: Build SvelteKit app
        working-directory: apps/web-svelte
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          # VAPID public key is not a secret; it must match the VAPID_PRIVATE_KEY /
          # VAPID_PUBLIC_KEY pair set in Supabase Edge Function secrets. The GH secret
          # PUBLIC_VAPID_KEY drifted from that pair (2026-06-12 incident: every web push
          # was rejected by FCM/autopush), so the canonical value is pinned here.
          PUBLIC_VAPID_KEY: BHKoiccZwq3Y5Qw5dmFxVLJIA7w9zcSZkchPKWk-vxBeR421yieZW7gGxuluBBa6sRmpIsFXRSuFyRarLcdvqT4
          PUBLIC_PLAUSIBLE_DOMAIN: ${{ secrets.PUBLIC_PLAUSIBLE_DOMAIN }}
        run: |
          # Misconfigured environment guard: production must build against the
          # production Supabase project, never a staging/mock value.
          test "$PUBLIC_SUPABASE_URL" = "https://emqzcygfwcvbmhxhfkcc.supabase.co"
          test -n "$PUBLIC_SUPABASE_ANON_KEY"
          test -n "$PUBLIC_VAPID_KEY"
          case "$PUBLIC_SUPABASE_ANON_KEY" in
            sb_secret_*)
              echo "::error::PUBLIC_SUPABASE_ANON_KEY must be sb_publishable_ or legacy anon (eyJ...), not sb_secret_ (bypasses RLS in the client bundle)"
              exit 1
              ;;
          esac
          pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web-svelte/build --project-name=jakstoimy --branch=main --commit-dirty=true

  smoke:
    # Read-only probe — production gets no smoke personas or written test data
    # (staging runs the full write-suite). Verifies the deployed shell serves
    # and the Supabase project behind it answers.
    name: Production probe (read-only)
    needs: deploy
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://app.jakstoimy.pl
    steps:
      - name: App shell responds
        run: |
          for i in 1 2 3; do
            status=$(curl -s -o /tmp/index.html -w "%{http_code}" https://app.jakstoimy.pl/)
            [ "$status" = "200" ] && break
            sleep 10
          done
          test "$status" = "200"
          grep -q "JakStoimy" /tmp/index.html

      - name: Supabase backend reachable
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          case "$PUBLIC_SUPABASE_ANON_KEY" in
            sb_secret_*)
              echo "::error::PUBLIC_SUPABASE_ANON_KEY must not be sb_secret_ (RLS bypass; not for client bundles)"
              exit 1
              ;;
          esac

          auth_status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $PUBLIC_SUPABASE_ANON_KEY" \
            "$PUBLIC_SUPABASE_URL/auth/v1/health")
          test "$auth_status" = "200"

          # /rest/v1/ OpenAPI root requires secret keys since 2026-03; probe a real table route.
          data_status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $PUBLIC_SUPABASE_ANON_KEY" \
            "$PUBLIC_SUPABASE_URL/rest/v1/categories?select=id&limit=0")
          case "$data_status" in
            200|401) ;;
            *)
              echo "::error::Data API returned HTTP $data_status (expected 200 or 401 with publishable key)"
              exit 1
              ;;
          esac
