# Supabase local development configuration
# Docs: https://supabase.com/docs/guides/local-development/cli/config
#
# Secrets (GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET) live in supabase/.env
# which is .gitignored. Copy supabase/.env.example and fill in your values.

project_id = "portfelik"

# =============================================================================
# API (PostgREST)
# =============================================================================
[api]
enabled     = true
port        = 54321
schemas     = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows    = 1000

[api.tls]
enabled = false

# =============================================================================
# DATABASE
# =============================================================================
[db]
port         = 54322
shadow_port  = 54320
major_version = 15

[db.pooler]
enabled = false

# =============================================================================
# REALTIME
# shopping_list_items publication is enabled in the migration.
# =============================================================================
[realtime]
enabled      = true
ip_version   = "IPv4"
max_header_length = 4096

# =============================================================================
# STUDIO (local dashboard — http://127.0.0.1:54323)
# =============================================================================
[studio]
enabled  = true
port     = 54323
api_url  = "http://127.0.0.1"

# =============================================================================
# INBUCKET (catches outbound emails locally — http://127.0.0.1:54324)
# Useful for testing invitation emails without a real SMTP server.
# =============================================================================
[inbucket]
enabled   = true
port      = 54324
smtp_port = 54325
pop3_port = 54326

# =============================================================================
# STORAGE
# Not used by Portfelik currently; kept enabled at minimal config.
# =============================================================================
[storage]
enabled         = true
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = false   # imgproxy not needed — saves ~200MB RAM on local stack

# =============================================================================
# AUTH (GoTrue)
# =============================================================================
[auth]
enabled      = true

# SvelteKit dev server URL. Update if you change the Vite port.
site_url     = "http://127.0.0.1:5173"

# Exact URLs GoTrue is allowed to redirect to after OAuth.
# Add your production URL here when you deploy.
additional_redirect_urls = [
  "http://localhost:5173",
  "http://localhost:5173/auth/callback",
  "http://127.0.0.1:5173",
  "http://127.0.0.1:5173/auth/callback",
  "http://localhost:5174",
  "http://localhost:5174/auth/callback",
  "http://127.0.0.1:5174",
  "http://127.0.0.1:5174/auth/callback"
]

jwt_expiry                   = 3600   # 1 hour
enable_refresh_token_rotation = true
refresh_token_reuse_interval  = 10
enable_signup                 = true
enable_anonymous_sign_ins     = false
enable_manual_linking         = false

# Email auth — disabled in favour of Google OAuth only.
[auth.email]
enable_signup         = false
enable_confirmations  = false
double_confirm_changes = true
max_frequency         = "1s"

# SMS — not used.
[auth.sms]
enable_signup         = false
enable_confirmations  = false

# =============================================================================
# GOOGLE OAUTH
# Credentials read from supabase/.env (never committed).
# redirect_uri is left empty — GoTrue uses its default callback path:
#   http://127.0.0.1:54321/auth/v1/callback
# Register this URL in Google Cloud Console → OAuth 2.0 → Authorised redirect URIs.
# =============================================================================
[auth.external.google]
enabled    = true
client_id  = "env(GOOGLE_CLIENT_ID)"
secret     = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = ""   # uses default: <api_url>/auth/v1/callback

# =============================================================================
# ANALYTICS — disabled to reduce local resource usage
# =============================================================================
[analytics]
enabled = false
