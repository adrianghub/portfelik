[mcp_servers.supabase-prod]
command = "npx"
args = ["-y", "@supabase/mcp-server-supabase@latest", "--read-only", "--project-ref=emqzcygfwcvbmhxhfkcc", "--features=storage,branching,development,functions,debugging,account,database,docs"]

[mcp_servers.supabase-staging]
command = "npx"
args = ["-y", "@supabase/mcp-server-supabase@latest", "--project-ref=nveyzxxnyccpnesebvuw", "--features=storage,development,functions,debugging,database,docs"]

[mcp_servers.svelte]
url = "https://mcp.svelte.dev/mcp"

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.obscura]
command = "npx"
args = ["-y", "@obscuraai/mcp-server"]

[agents]
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 1800

[features]
hooks = true
