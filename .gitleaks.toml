title = "Portfelik secret scanning"

[extend]
useDefault = true

[[allowlists]]
description = "Public VAPID key, safe to publish by design"
regexTarget = "match"
regexes = [
  '''BHKoiccZwq3Y5Qw5dmFxVLJIA7w9zcSZkchPKWk-vxBeR421yieZW7gGxuluBBa6sRmpIsFXRSuFyRarLcdvqT4''',
]

[[allowlists]]
description = "Supabase local-dev demo JWTs used by every local CLI stack"
regexTarget = "match"
regexes = [
  '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9\.CRFA0NiK7W9oL8kT-UCHxflKRe4VXN-tS0MqJpSaYwU''',
  '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9\.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0''',
  '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0\.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU''',
  '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0\.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl196z2-SbVE''',
]

[[allowlists]]
description = "Documented non-secret examples and example files"
paths = [
  '''(^|/)\.env\.test\.example$''',
  '''.*\.example$''',
]

[[allowlists]]
description = "CLAUDE.md documents the local changed-file secret grep"
condition = "AND"
regexTarget = "line"
paths = [
  '''(^|/)CLAUDE\.md$''',
]
regexes = [
  '''grep -rE .*eyJ\[a-zA-Z0-9_\-\]\{20,\}.*sb_secret_.*PRIVATE.*password\\s\*=.*<changed files>''',
]
