<!doctype html>
<html lang="pl" class="dark" style="color-scheme: dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="text-scale" content="scale" />
    <meta name="theme-color" content="#020617" />
    <meta name="description" content="Personal finance tracker" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Portfelik" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
    <script>
      // Restore the user's accent color before first paint to avoid a flash.
      // Resolved values are mirrored to localStorage by applyAccent(); DB stays
      // the source of truth and re-applies once the profile loads.
      try {
        var a = JSON.parse(localStorage.getItem("portfelik_accent") || "null");
        if (a && a.from && a.to && a.glow) {
          var s = document.documentElement.style;
          s.setProperty("--color-accent-from", a.from);
          s.setProperty("--color-accent-to", a.to);
          s.setProperty("--color-accent-glow", a.glow);
          s.setProperty("--color-accent", a.from);
        }
      } catch (e) {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
